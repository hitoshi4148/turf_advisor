<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LBE4PX0VL3"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    
      gtag('config', 'G-LBE4PX0VL3');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芝しごと・AI質問箱 - 芝管理AIチャット</title>
    <link rel="stylesheet" href="style.css">
    <!-- 毛筆書体フォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Markdownレンダラー -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <!-- XSS対策 -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
</head>
<body>
    <div class="container">
        <a class="pr-banner-link" href="https://www.turf-tools.jp/services-4" target="_blank" rel="noopener noreferrer">
            <img class="pr-banner-img" src="banner_pr_size1.png" alt="芝管理のプロにPRしませんか？ 農薬・資材・機械メーカー様向け アプリ内掲載パートナー募集中" width="300" height="112">
        </a>
        <header>
            <h1>芝しごと・AI質問箱</h1>
            <p class="subtitle">芝管理に関するAIチャットアシスタント</p>
        </header>

        <div class="main-content">
            <!-- 設定パネル -->
            <div class="settings-panel">
                <!-- 注意書き（固定表示） -->
                <div class="scroll-notice">
                    <div class="scroll-title">【AI利用時の注意4カ条】</div>
                    <div class="scroll-content">
                        ① 個人の名前や連絡先は入力しない<br>
                        ② お客様の情報は入力しない<br>
                        ③ 施設の管理計画や記録は入力しない<br>
                        ④ 入力した内容は外部に送信されます
                    </div>
                </div>
                
                <!-- 設定項目（スクロール可能） -->
                <div class="settings-content">
                    <h2>設定</h2>
                    
                    <!-- 緯度経度入力 -->
                    <div class="setting-group">
                    <label for="latitude">緯度（北緯）:</label>
                    <input type="number" id="latitude" step="any" placeholder="例: 35.6762">
                    
                    <label for="longitude">経度（東経）:</label>
                    <input type="number" id="longitude" step="any" placeholder="例: 139.6503">
                    
                    <button id="getCurrentLocation" class="btn btn-location" type="button">
                        📍 現在地を取得
                    </button>
                        <div id="locationStatus" class="location-status"></div>
                    </div>

                    <!-- Radio Button 1: 場所タイプ -->
                    <div class="setting-group">
                    <label>場所タイプ:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="locationType" value="未指定" checked> 未指定</label>
                        <label><input type="radio" name="locationType" value="ゴルフコース"> ゴルフコース</label>
                        <label><input type="radio" name="locationType" value="グラウンド"> グラウンド</label>
                        </div>
                    </div>

                    <!-- Radio Button 2: グリーンタイプ -->
                    <div class="setting-group">
                    <label>グリーンタイプ:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="greenType" value="未指定" checked> 未指定</label>
                        <label><input type="radio" name="greenType" value="暖地型グリーン"> 暖地型グリーン</label>
                        <label><input type="radio" name="greenType" value="寒地型グリーン"> 寒地型グリーン</label>
                        </div>
                    </div>

                    <!-- Radio Button 3: 芝タイプ -->
                    <div class="setting-group">
                    <label>芝タイプ:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="turfType" value="未指定" checked> 未指定</label>
                        <label><input type="radio" name="turfType" value="暖地型"> 暖地型</label>
                        <label><input type="radio" name="turfType" value="寒地型"> 寒地型</label>
                        <label><input type="radio" name="turfType" value="WOS"> ウインターオーバーシード</label>
                        <label><input type="radio" name="turfType" value="IS"> インターシード</label>
                        </div>
                    </div>

                    <!-- Radio Button 4: 回答モード -->
                    <div class="setting-group">
                    <label>回答モード:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="responseMode" value="未指定" checked> 未指定</label>
                        <label><input type="radio" name="responseMode" value="慎重に回答"> 慎重に回答</label>
                        </div>
                    </div>

                    <button id="saveSettings" class="btn btn-secondary">設定を保存</button>
                </div>
            </div>

            <!-- チャットパネル -->
            <div class="chat-panel">
                <div class="chat-messages" id="chatMessages">
                    <div class="message bot-message">
                        <div class="message-content">こんにちは！芝しごと・AI質問箱です。芝管理に関するご質問をお聞かせください。</div>
                    </div>
                </div>
                
                <div class="chat-input-container">
                    <textarea 
                        id="chatInput" 
                        placeholder="芝管理に関する質問を入力してください..."
                        rows="3"
                    ></textarea>
                    <button id="sendButton" class="btn btn-primary">送信</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>Powered by Gemini 2.0 Flash</p>
            <p>
                <a href="https://www.turf-tools.jp/" target="_blank" rel="noopener noreferrer">グロウアンドプログレス</a>
            </p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
