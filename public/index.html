<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI芝生質問箱 - 芝管理AIチャット</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌱 AI芝生質問箱</h1>
            <p class="subtitle">芝管理に関するAIチャットアシスタント</p>
        </header>

        <div class="main-content">
            <!-- 設定パネル -->
            <div class="settings-panel">
                <h2>設定</h2>
                
                <!-- 緯度経度入力 -->
                <div class="setting-group">
                    <label for="latitude">緯度（北緯）:</label>
                    <input type="number" id="latitude" step="any" placeholder="例: 35.6762">
                    
                    <label for="longitude">経度（東経）:</label>
                    <input type="number" id="longitude" step="any" placeholder="例: 139.6503">
                    
                    <button id="getCurrentLocation" class="btn btn-location" type="button">
                        📍 現在地を取得
                    </button>
                    <div id="locationStatus" class="location-status"></div>
                </div>

                <!-- Radio Button 1: 場所タイプ -->
                <div class="setting-group">
                    <label>場所タイプ:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="locationType" value="未指定" checked> 未指定</label>
                        <label><input type="radio" name="locationType" value="ゴルフコース"> ゴルフコース</label>
                        <label><input type="radio" name="locationType" value="グラウンド"> グラウンド</label>
                    </div>
                </div>

                <!-- Radio Button 2: グリーンタイプ -->
                <div class="setting-group">
                    <label>グリーンタイプ:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="greenType" value="未指定" checked> 未指定</label>
                        <label><input type="radio" name="greenType" value="暖地型グリーン"> 暖地型グリーン</label>
                        <label><input type="radio" name="greenType" value="寒地型グリーン"> 寒地型グリーン</label>
                    </div>
                </div>

                <!-- Radio Button 3: 芝タイプ -->
                <div class="setting-group">
                    <label>芝タイプ:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="turfType" value="未指定" checked> 未指定</label>
                        <label><input type="radio" name="turfType" value="暖地型"> 暖地型</label>
                        <label><input type="radio" name="turfType" value="寒地型"> 寒地型</label>
                        <label><input type="radio" name="turfType" value="WOS"> WOS</label>
                        <label><input type="radio" name="turfType" value="IS"> IS</label>
                    </div>
                </div>

                <!-- Radio Button 4: 回答モード -->
                <div class="setting-group">
                    <label>回答モード:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="responseMode" value="未指定" checked> 未指定</label>
                        <label><input type="radio" name="responseMode" value="慎重に回答"> 慎重に回答</label>
                    </div>
                </div>

                <button id="saveSettings" class="btn btn-secondary">設定を保存</button>
            </div>

            <!-- チャットパネル -->
            <div class="chat-panel">
                <div class="chat-messages" id="chatMessages">
                    <div class="message bot-message">
                        <div class="message-content">
                            こんにちは！AI芝生質問箱です。芝管理に関するご質問をお聞かせください。
                        </div>
                    </div>
                </div>
                
                <div class="chat-input-container">
                    <textarea 
                        id="chatInput" 
                        placeholder="芝管理に関する質問を入力してください..."
                        rows="3"
                    ></textarea>
                    <button id="sendButton" class="btn btn-primary">送信</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
